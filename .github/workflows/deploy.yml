name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Generate wrangler.toml from secrets
        run: |
          sed \
            -e 's/YOUR_CLOUDFLARE_ACCOUNT_ID/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/g' \
            -e 's/YOUR_KV_NAMESPACE_ID/${{ secrets.KV_NAMESPACE_ID }}/g' \
            -e 's/YOUR_KV_PREVIEW_NAMESPACE_ID/${{ secrets.KV_PREVIEW_NAMESPACE_ID }}/g' \
            wrangler.toml.example > wrangler.toml
          # If KV_NAMESPACE_ID is unset or "none", strip the [[kv_namespaces]]
          # block so Cloudflare doesn't reject it. Dashboard falls back to
          # browser-only (localStorage) mode.
          if [ "${{ secrets.KV_NAMESPACE_ID }}" = "none" ] || [ -z "${{ secrets.KV_NAMESPACE_ID }}" ]; then
            awk '/^# KV namespace for config storage/{skip=1} skip && /^\[/ && !/^\[\[/{skip=0} !skip' wrangler.toml > tmp.toml && mv tmp.toml wrangler.toml
          fi

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Push CF Access service token secrets to Cloudflare if configured.
          # Only needed when your Hubitat tunnel is protected by CF Access.
          # Add CF_ACCESS_CLIENT_ID and CF_ACCESS_CLIENT_SECRET to your repo
          # secrets (Settings → Secrets and variables → Actions) to enable.
          preCommands: |
            if [ -n "$CF_ACCESS_CLIENT_ID" ]; then
              echo "$CF_ACCESS_CLIENT_ID" | wrangler secret put CF_ACCESS_CLIENT_ID
              echo "$CF_ACCESS_CLIENT_SECRET" | wrangler secret put CF_ACCESS_CLIENT_SECRET
            fi
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
